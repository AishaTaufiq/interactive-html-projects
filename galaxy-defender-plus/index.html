<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>Galaxy Defender Plus</title>
<style>
  :root{
    --bg:#05060f; --panel:rgba(15,18,40,.72); --border:rgba(120,140,220,.25);
    --text:#e6ecff; --muted:#9aa6d1; --primary:#6ea8ff; --accent:#b07cff;
    --danger:#ff5577; --good:#3ddc97;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden;
    user-select:none;-webkit-user-select:none;touch-action:none}
  #wrap{position:fixed;inset:0;background:
    radial-gradient(1200px 600px at 70% -10%, rgba(110,168,255,.18), transparent 60%),
    radial-gradient(900px 500px at 10% 110%, rgba(176,124,255,.18), transparent 60%),
    var(--bg);}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .hud{position:absolute;top:12px;left:12px;right:12px;display:flex;gap:10px;
    justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:5}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;
    padding:10px 14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    box-shadow:0 8px 30px rgba(0,0,0,.35)}
  .row{display:flex;gap:10px;align-items:center}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .stat .v{font-size:18px;font-weight:700}
  .hp{width:180px;height:10px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
  .hp>div{height:100%;background:linear-gradient(90deg,var(--good),var(--primary));
    width:100%;transition:width .15s}
  .ach{position:absolute;left:12px;bottom:12px;z-index:5;max-width:280px}
  .ach .item{font-size:12px;color:var(--muted);margin-top:4px}
  .ach .item.on{color:var(--text)}
  .toast{position:absolute;left:50%;top:80px;transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:10px 16px;z-index:6;opacity:0;transition:opacity .3s,transform .3s;
    pointer-events:none}
  .toast.show{opacity:1;transform:translate(-50%,8px)}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    z-index:10;background:radial-gradient(circle at center, rgba(5,6,15,.55), rgba(5,6,15,.85))}
  .menu{background:var(--panel);border:1px solid var(--border);border-radius:20px;
    padding:28px;max-width:420px;width:90%;text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,.55)}
  h1{margin:0 0 4px;font-size:28px;background:linear-gradient(90deg,var(--primary),var(--accent));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .diffs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
  button{font:inherit;color:var(--text);background:rgba(110,168,255,.12);
    border:1px solid var(--border);border-radius:12px;padding:10px 14px;cursor:pointer;
    transition:background .15s,transform .05s}
  button:hover{background:rgba(110,168,255,.22)}
  button:active{transform:scale(.97)}
  button.pri{background:linear-gradient(135deg,var(--primary),var(--accent));
    border-color:transparent;font-weight:700}
  .hint{color:var(--muted);font-size:12px;margin-top:14px;line-height:1.5}
  @media (max-width:520px){.hp{width:120px}.stat .v{font-size:16px}h1{font-size:22px}}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div class="hud">
    <div class="card row">
      <div class="stat"><div class="l">Score</div><div class="v" id="score">0</div></div>
      <div class="stat"><div class="l">Wave</div><div class="v" id="wave">1</div></div>
      <div class="stat"><div class="l">Combo</div><div class="v" id="combo">0</div></div>
    </div>
    <div class="card">
      <div class="stat"><div class="l">Hull</div><div class="hp"><div id="hpbar"></div></div></div>
    </div>
  </div>
  <div class="ach card" id="achBox" style="display:none">
    <div class="stat"><div class="l">Achievements</div></div>
    <div id="achList"></div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="overlay" id="overlay">
    <div class="menu">
      <h1>Galaxy Defender Plus</h1>
      <div class="sub">Defend the sector. Move with WASD / arrows or drag. Fire with Space / tap.</div>
      <div class="diffs">
        <button data-d="easy">Easy</button>
        <button data-d="normal" class="pri">Normal</button>
        <button data-d="hard">Hard</button>
      </div>
      <div class="hint">Survive waves, build combos, unlock achievements.</div>
    </div>
  </div>
</div>
<script>
(()=>{
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
const $=id=>document.getElementById(id);
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);
  W=cvs.clientWidth;H=cvs.clientHeight;
  cvs.width=W*DPR;cvs.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
  initStars();}
addEventListener('resize',resize);

const DIFFS={
  easy:  {spawn:1.3, espeed:60,  ehp:1, edmg:8,  name:'Easy'},
  normal:{spawn:0.9, espeed:90,  ehp:2, edmg:14, name:'Normal'},
  hard:  {spawn:0.55,espeed:130, ehp:3, edmg:22, name:'Hard'},
};
const ACHS=[
  {id:'first',  name:'First Blood',  desc:'Destroy your first enemy'},
  {id:'c10',    name:'Combo x10',    desc:'Reach a 10 combo'},
  {id:'c25',    name:'Combo x25',    desc:'Reach a 25 combo'},
  {id:'s1k',    name:'Rookie',       desc:'Score 1,000'},
  {id:'s5k',    name:'Ace Pilot',    desc:'Score 5,000'},
  {id:'w5',     name:'Wave 5',       desc:'Survive to wave 5'},
  {id:'w10',    name:'Wave 10',      desc:'Survive to wave 10'},
];

let state=null;
function newState(diff){
  return {
    diff:DIFFS[diff], diffKey:diff,
    player:{x:W/2,y:H-80,r:16,hp:100,maxhp:100,cool:0},
    bullets:[],enemies:[],parts:[],
    score:0,wave:1,combo:0,comboTimer:0,
    spawnTimer:0,waveTimer:8,
    unlocked:new Set(),
    over:false,
  };
}

let stars=[];
function initStars(){
  stars=[];const n=Math.floor(W*H/6000);
  for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H,
    z:Math.random()*.8+.2,s:Math.random()*1.4+.3});
}

const keys={};
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;
  if(e.key===' ')e.preventDefault();});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

let pointer={active:false,x:0,y:0,fire:false};
cvs.addEventListener('pointerdown',e=>{pointer.active=true;pointer.fire=true;
  const r=cvs.getBoundingClientRect();pointer.x=e.clientX-r.left;pointer.y=e.clientY-r.top;
  cvs.setPointerCapture(e.pointerId);});
cvs.addEventListener('pointermove',e=>{if(!pointer.active)return;
  const r=cvs.getBoundingClientRect();pointer.x=e.clientX-r.left;pointer.y=e.clientY-r.top;});
cvs.addEventListener('pointerup',()=>{pointer.active=false;pointer.fire=false;});
cvs.addEventListener('pointercancel',()=>{pointer.active=false;pointer.fire=false;});

function spawnEnemy(){
  const s=state,d=s.diff;
  const hp=d.ehp+Math.floor(s.wave/3);
  const speed=d.espeed+s.wave*6+Math.random()*30;
  s.enemies.push({x:20+Math.random()*(W-40),y:-30,r:14+Math.random()*6,
    hp,maxhp:hp,vy:speed,vx:(Math.random()-.5)*40,t:0});
}
function shoot(){
  const p=state.player;if(p.cool>0)return;
  p.cool=0.16;
  state.bullets.push({x:p.x-6,y:p.y-14,vy:-560});
  state.bullets.push({x:p.x+6,y:p.y-14,vy:-560});
}
function burst(x,y,c,n=14){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=40+Math.random()*180;
    state.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:.6+Math.random()*.4,t:0,c});}
}
function toast(t){const el=$('toast');el.textContent=t;el.classList.add('show');
  clearTimeout(toast._);toast._=setTimeout(()=>el.classList.remove('show'),1800);}
function unlock(id){if(state.unlocked.has(id))return;
  state.unlocked.add(id);const a=ACHS.find(x=>x.id===id);
  toast('Achievement: '+a.name);renderAch();}
function renderAch(){
  $('achBox').style.display='block';
  $('achList').innerHTML=ACHS.map(a=>
    `<div class="item${state.unlocked.has(a.id)?' on':''}">`+
    `${state.unlocked.has(a.id)?'★':'☆'} ${a.name} — ${a.desc}</div>`).join('');
}

let last=performance.now();
function loop(now){
  const dt=Math.min(.033,(now-last)/1000);last=now;
  ctx.clearRect(0,0,W,H);
  // stars
  for(const s of stars){
    s.y+=(20+s.z*60)*dt*(state&&!state.over?1:.3);
    if(s.y>H){s.y=0;s.x=Math.random()*W;}
    ctx.globalAlpha=s.z;ctx.fillStyle='#cfe0ff';
    ctx.fillRect(s.x,s.y,s.s,s.s);
  }
  ctx.globalAlpha=1;
  if(state&&!state.over)update(dt);
  if(state)draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function update(dt){
  const s=state,p=s.player;
  // input
  let dx=0,dy=0;
  if(keys['a']||keys['arrowleft'])dx-=1;
  if(keys['d']||keys['arrowright'])dx+=1;
  if(keys['w']||keys['arrowup'])dy-=1;
  if(keys['s']||keys['arrowdown'])dy+=1;
  const sp=320;
  if(dx||dy){const l=Math.hypot(dx,dy);p.x+=dx/l*sp*dt;p.y+=dy/l*sp*dt;}
  if(pointer.active){const tx=pointer.x,ty=pointer.y;
    const ddx=tx-p.x,ddy=ty-p.y,d=Math.hypot(ddx,ddy);
    if(d>2){const m=Math.min(d,sp*dt);p.x+=ddx/d*m;p.y+=ddy/d*m;}}
  p.x=Math.max(p.r,Math.min(W-p.r,p.x));
  p.y=Math.max(p.r,Math.min(H-p.r,p.y));
  p.cool-=dt;
  if(keys[' ']||pointer.fire)shoot();

  // spawn
  s.spawnTimer-=dt;
  if(s.spawnTimer<=0){spawnEnemy();s.spawnTimer=Math.max(.15,s.diff.spawn-s.wave*.04);}
  s.waveTimer-=dt;
  if(s.waveTimer<=0){s.wave++;s.waveTimer=8;
    if(s.wave===5)unlock('w5');if(s.wave===10)unlock('w10');}

  // bullets
  for(const b of s.bullets){b.y+=b.vy*dt;}
  s.bullets=s.bullets.filter(b=>b.y>-20);

  // enemies
  for(const e of s.enemies){
    e.t+=dt;e.y+=e.vy*dt;e.x+=e.vx*dt;
    if(e.x<e.r||e.x>W-e.r)e.vx*=-1;
  }

  // collisions bullet-enemy
  for(const b of s.bullets){
    for(const e of s.enemies){
      if(e.hp<=0)continue;
      const dx=b.x-e.x,dy=b.y-e.y;
      if(dx*dx+dy*dy<(e.r+4)*(e.r+4)){
        e.hp--;b.y=-99;burst(b.x,b.y,'#9ec5ff',6);
        if(e.hp<=0){
          s.score+=10+s.wave*2;s.combo++;s.comboTimer=2;
          burst(e.x,e.y,'#ff88aa',18);
          if(!s.unlocked.has('first'))unlock('first');
          if(s.combo>=10)unlock('c10');
          if(s.combo>=25)unlock('c25');
          if(s.score>=1000)unlock('s1k');
          if(s.score>=5000)unlock('s5k');
        }
        break;
      }
    }
  }
  s.enemies=s.enemies.filter(e=>e.hp>0&&e.y<H+40);

  // enemy hit player
  for(const e of s.enemies){
    const dx=e.x-p.x,dy=e.y-p.y;
    if(dx*dx+dy*dy<(e.r+p.r)*(e.r+p.r)){
      p.hp-=s.diff.edmg;e.hp=0;burst(e.x,e.y,'#ff5577',24);
      s.combo=0;
      if(p.hp<=0){p.hp=0;s.over=true;gameOver();}
    }
  }
  // off-screen enemy = lose combo + small dmg
  s.enemies.forEach(e=>{if(e.y>H+20){s.combo=0;}});

  s.comboTimer-=dt;if(s.comboTimer<=0)s.combo=0;

  // parts
  for(const pt of s.parts){pt.t+=dt;pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vx*=.96;pt.vy*=.96;}
  s.parts=s.parts.filter(p=>p.t<p.life);

  // hud
  $('score').textContent=s.score;
  $('wave').textContent=s.wave;
  $('combo').textContent=s.combo;
  $('hpbar').style.width=(p.hp/p.maxhp*100)+'%';
}

function draw(){
  const s=state;
  // particles
  for(const p of s.parts){
    const a=1-p.t/p.life;ctx.globalAlpha=a;ctx.fillStyle=p.c;
    ctx.fillRect(p.x-1.5,p.y-1.5,3,3);
  }
  ctx.globalAlpha=1;
  // bullets
  ctx.fillStyle='#bcd6ff';
  for(const b of s.bullets){ctx.fillRect(b.x-1.5,b.y-8,3,12);}
  // enemies
  for(const e of s.enemies){
    ctx.save();ctx.translate(e.x,e.y);ctx.rotate(Math.sin(e.t*4)*.1);
    const g=ctx.createLinearGradient(0,-e.r,0,e.r);
    g.addColorStop(0,'#ff7aa8');g.addColorStop(1,'#7a1f4a');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.moveTo(0,e.r);ctx.lineTo(e.r,-e.r*.5);
    ctx.lineTo(0,-e.r*.2);ctx.lineTo(-e.r,-e.r*.5);ctx.closePath();ctx.fill();
    ctx.fillStyle='#ffd1e0';ctx.fillRect(-3,-2,6,5);
    ctx.restore();
  }
  // player
  const p=s.player;
  ctx.save();ctx.translate(p.x,p.y);
  // thruster
  const tf=2+Math.random()*3;
  const tg=ctx.createLinearGradient(0,p.r,0,p.r+18+tf);
  tg.addColorStop(0,'rgba(110,168,255,.9)');tg.addColorStop(1,'rgba(110,168,255,0)');
  ctx.fillStyle=tg;
  ctx.beginPath();ctx.moveTo(-5,p.r);ctx.lineTo(5,p.r);ctx.lineTo(0,p.r+18+tf);ctx.closePath();ctx.fill();
  // body
  const bg=ctx.createLinearGradient(0,-p.r,0,p.r);
  bg.addColorStop(0,'#cfe0ff');bg.addColorStop(1,'#3b62c8');
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.moveTo(0,-p.r);ctx.lineTo(p.r,p.r);
  ctx.lineTo(0,p.r*.6);ctx.lineTo(-p.r,p.r);ctx.closePath();ctx.fill();
  ctx.fillStyle='#9ec5ff';ctx.fillRect(-3,-4,6,8);
  ctx.restore();
}

function gameOver(){
  const o=$('overlay');
  o.innerHTML=`<div class="menu"><h1>Game Over</h1>
    <div class="sub">Score ${state.score} · Wave ${state.wave} · ${state.diff.name}</div>
    <div class="diffs"><button data-d="easy">Easy</button>
    <button data-d="normal" class="pri">Normal</button>
    <button data-d="hard">Hard</button></div>
    <div class="hint">Press a difficulty to play again.</div></div>`;
  o.style.display='flex';
  o.querySelectorAll('button[data-d]').forEach(b=>b.onclick=()=>start(b.dataset.d));
}
function start(diff){
  state=newState(diff);renderAch();
  $('overlay').style.display='none';
}
document.querySelectorAll('#overlay button[data-d]').forEach(b=>{
  b.onclick=()=>start(b.dataset.d);
});
resize();
})();
</script>
</body>
</html>
